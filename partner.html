<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelompok 2 - FT UNRI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>

        .bg-lighter {
            background-color: #f8f9fa !important;
            border-top: 1px solid #dee2e6;
            border-bottom: 1px solid #dee2e6;
            padding: 80px 0;
        }

        .partner-title {
            font-weight: 700;
            color: #212529;
            border-left: 5px solid #8D1E20;
            padding-left: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .partner-wrapper {
            background-color: #ffffff;
            border: 1px solid #dee2e6;
            height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .partner-wrapper:hover {
            border-color: #8D1E20;
            background-color: #fff;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            transform: translateY(-5px);
        }

        .partner-logo {
            max-height: 80px;
            max-width: 90%;
            filter: grayscale(100%);
            opacity: 0.6;
            transition: all 0.3s ease;
            object-fit: contain;
        }

        .partner-wrapper:hover .partner-logo {
            filter: grayscale(0%);
            opacity: 1;
        }
    </style>
</head>

<body>
    <section class="py-5 bg-lighter">
        <div class="container">
            <h2 class="partner-title mb-5">PARTNERS</h2>
            <div class="row row-cols-2 row-cols-md-4 g-3">
                <div class="col">
                    <div class="partner-wrapper">
                        <img src="icons/logo4.png" class="partner-logo img-fluid" alt="Daehan">
                    </div>
                </div>
                <div class="col">
                    <div class="partner-wrapper">
                        <img src="icons/logo3.png" class="partner-logo img-fluid" alt="USU">
                    </div>
                </div>
                <div class="col">
                    <div class="partner-wrapper">
                        <img src="icons/logo4.png" class="partner-logo img-fluid" alt="Telkom">
                    </div>
                </div>
                <div class="col">
                    <div class="partner-wrapper">
                        <img src="icons/logo3.png" class="partner-logo img-fluid" alt="PLN">
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
